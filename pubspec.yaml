name: smart_assistant_app
description: A smart assistant Flutter app with suggestions, chat, and history.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.1 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  http: ^1.2.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
